---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  actions: read
  packages: read
  contents: write
  pull-requests: read
  security-events: write

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/app-ci.yaml@v2.0.5

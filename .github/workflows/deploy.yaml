---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/app-deploy.yaml@6fc3bc2b7ad4b7ae3dcf68d644d6e3a792eda831
    with:
      repository: "hassio-addons"
      repository_edge: "hassio-addons-edge"
      repository_beta: "hassio-addons-beta"
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/app-deploy.yaml@383c10d83acbe341acbb35a4a61bfd14827f00f0 # v3.0.0
    with:
      repository: "hassio-addons"
      repository_edge: "hassio-addons-edge"
      repository_beta: "hassio-addons-beta"
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

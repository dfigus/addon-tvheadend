---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/app-deploy.yaml@bf24a85062d78a850e6747e4040527d40e023abd # v2.0.5
    with:
      repository: "hassio-addons"
      repository_edge: "hassio-addons-edge"
      repository_beta: "hassio-addons-beta"
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
